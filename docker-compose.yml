name: wjehomesvc

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wjehomesvc}_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homesvc

  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-wjehomesvc}_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-38304}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "38304:38304"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:38304/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homesvc

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:38304/notifications}
    container_name: ${COMPOSE_PROJECT_NAME:-wjehomesvc}_frontend
    restart: unless-stopped
    ports:
      - "38204:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - homesvc

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-wjehomesvc}_postgres_data

networks:
  homesvc:
    name: ${COMPOSE_PROJECT_NAME:-wjehomesvc}_network
